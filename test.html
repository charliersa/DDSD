<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>繪圖軟體資訊整合</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { background: #FBFAF7; }

    /* iframe 填滿整個視窗，隨螢幕大小自動縮放。
       100dvh（dynamic viewport height）讓手機瀏覽器上下列消失時也能填滿，
       不支援 dvh 的舊瀏覽器會退回 100vh。 */
    .embed {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    class="embed"
    src="https://react-app-five-xi.vercel.app/"
    title="繪圖軟體資訊整合"
    loading="lazy"
    allowfullscreen
  ></iframe>
</body>
</html>
