name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 允許在 Actions 頁面手動觸發

# 讓 GITHUB_TOKEN 有權限發布到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署，新 push 會取消進行中的舊部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-app # App 在子資料夾，所有指令都在這裡跑
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-app/package-lock.json

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: react-app/dist # 把打包結果交給 Pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
